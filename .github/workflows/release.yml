name: Release Binary (Manuell & Tag)

on:
  # Trigger 1: Manueller Knopfdruck
  workflow_dispatch:
    inputs:
      version:
        description: 'Versionsnummer für manuellen Build (z.B. 1.0.0 - OHNE v)'
        required: true
        default: '1.0.0'

  # Trigger 2: Automatischer Push bei neuem Tag
  push:
    tags:
      - 'v*' # Reagiert auf v1.0.0, v2.1.3, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Build Release Binary
      run: cargo build --release

    - name: Rename Binary
      run: cp target/release/clean-my-keys ./clean-my-keys-linux-amd64

    - name: Set Release Tag
      id: vars
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          # Extrahiert das Tag aus dem Git-Ref (z.B. refs/tags/v1.0.0 -> v1.0.0)
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Create GitHub Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.vars.outputs.tag }}
        name: Release ${{ steps.vars.outputs.tag }}
        files: clean-my-keys-linux-amd64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}